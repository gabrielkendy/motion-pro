<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MotionVault</title>
<link rel="stylesheet" href="css/app.css?v=210">
</head>
<body>

<!-- ============ LOGIN GATE (overlay when not authenticated) ============ -->
<div id="gate" class="gate hidden">
    <div class="gate__box">
        <div class="gate__logo">MotionVault</div>
        <div class="gate__sub">by PacotesFX</div>

        <div id="gate-tabs" class="gate__tabs">
            <button id="gt-login" class="gt active">Entrar</button>
            <button id="gt-signup" class="gt">Criar conta · 14 dias grátis</button>
        </div>

        <div class="gate__form">
            <input id="g-email" type="email" placeholder="seu@email.com" autocomplete="email">
            <input id="g-password" type="password" placeholder="Senha (mín 8 caracteres)" autocomplete="current-password">
            <button id="g-submit" class="g-btn">Entrar</button>
            <div id="g-msg" class="gate__msg"></div>
        </div>

        <div class="gate__plans" id="g-plans">
            <div class="gate__plans-title">Planos disponíveis</div>
            <div class="g-plan"><b>Trial 14 dias</b><span>Grátis</span></div>
            <div class="g-plan"><b>Anual</b><span>R$ 199</span></div>
            <div class="g-plan"><b>Vitalício</b><span>R$ 499</span></div>
        </div>

        <div class="gate__footer">
            <a id="g-forgot" href="#">Esqueci minha senha</a>
        </div>
    </div>
</div>

<!-- ============ HEADER BAR (PacotesFX brand strip) ============ -->
<header class="headbar">
    <div class="headbar__brand">
        <div class="headbar__logo">
            <svg viewBox="0 0 32 32" width="22" height="22"><circle cx="16" cy="16" r="14" fill="url(#g)"/><path d="M10 11h6c2 0 4 1.4 4 4s-2 4-4 4h-2v3h-4z M14 14v2h2c.6 0 1-.4 1-1s-.4-1-1-1z" fill="#000"/><defs><linearGradient id="g" x1="0" y1="0" x2="32" y2="32"><stop offset="0" stop-color="#38e287"/><stop offset="1" stop-color="#22c573"/></linearGradient></defs></svg>
        </div>
        <div class="headbar__text">
            <div class="headbar__name">MotionVault</div>
            <div class="headbar__sub">by PacotesFX</div>
        </div>
    </div>
    <div class="headbar__tools">
        <button class="tool" data-view="all" title="Tudo (todos os packs)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button class="tool active" data-view="grid" title="Grid">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        </button>
        <button class="tool" id="btn-favorites" title="Favoritos">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15,9 22,9.5 17,14 18.5,21 12,17.5 5.5,21 7,14 2,9.5 9,9"/></svg>
        </button>
    </div>
    <div class="headbar__search">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="q" type="text" placeholder="Buscar em 7.906 templates..." autocomplete="off">
        <button id="q-clear" class="q-clear hidden">×</button>
    </div>
    <div class="headbar__actions">
        <button id="btn-density" class="iconbtn" title="Densidade (compacto/normal/grande)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button id="btn-debug" class="iconbtn" title="Console (Ctrl+`)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        </button>
    </div>
</header>

<!-- ============ PACK TABS ============ -->
<nav id="tabs" class="tabs"></nav>

<!-- ============ BREADCRUMB ============ -->
<div id="breadcrumb" class="breadcrumb"></div>

<!-- ============ MAIN LAYOUT ============ -->
<aside id="side" class="sidebar"></aside>
<main id="grid" class="grid"></main>

<!-- ============ STATUS BAR ============ -->
<footer class="statusbar">
    <span id="status">Carregando...</span>
    <span id="count" class="muted"></span>
</footer>

<!-- ============ DEBUG LOG (hidden) ============ -->
<div id="log" class="log hidden">
    <div class="log__head">
        <span>Console</span>
        <button id="log-close">×</button>
    </div>
    <div id="log-body" class="log__body"></div>
</div>

<script src="js/lib/CSInterface.js?v=210"></script>
<script src="js/config.js?v=210"></script>
<script src="js/app.js?v=210"></script>
</body>
</html>
